<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Object Viewer</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #0b0f14; color: #e6eef5; }
      #viewer { width: 100%; height: 100%; display: block; }
      #overlay {
        position: absolute; top: 16px; left: 16px; padding: 10px 14px;
        background: rgba(15, 20, 28, 0.8); border-radius: 10px;
        font-family: "Georgia", serif; font-size: 14px;
      }
      #progress { position: absolute; bottom: 16px; left: 16px; right: 16px; }
      #bar { height: 6px; background: #23313c; border-radius: 999px; overflow: hidden; }
      #bar span { display: block; height: 100%; width: 0%; background: #00c2a8; }
    </style>
  </head>
  <body>
    <div id="overlay">Loading model…</div>
    <div id="progress">
      <div id="bar"><span></span></div>
    </div>
    <canvas id="viewer"></canvas>

    <script type="module">
      import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
      import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
      import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

      const canvas = document.getElementById('viewer');
      const overlay = document.getElementById('overlay');
      const bar = document.querySelector('#bar span');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b0f14);

      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
      camera.position.set(0, 0.4, 1.2);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;

      const hemi = new THREE.HemisphereLight(0xffffff, 0x223344, 1.1);
      const dir = new THREE.DirectionalLight(0xffffff, 1.2);
      dir.position.set(3, 4, 2);
      scene.add(hemi, dir);

      const params = new URLSearchParams(window.location.search);
      const modelUrl = params.get('model_url');
      if (!modelUrl) {
        overlay.textContent = 'Missing model_url parameter.';
      }

      const loader = new GLTFLoader();
      loader.load(
        modelUrl,
        (gltf) => {
          const model = gltf.scene;
          scene.add(model);

          const box = new THREE.Box3().setFromObject(model);
          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());
          model.position.sub(center);

          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 1.0 / maxDim;
          model.scale.setScalar(scale);

          overlay.textContent = 'Drag to orbit, pinch to zoom.';
          bar.style.width = '100%';
        },
        (xhr) => {
          if (xhr.total) {
            const pct = (xhr.loaded / xhr.total) * 100;
            bar.style.width = `${pct.toFixed(0)}%`;
          }
        },
        (err) => {
          overlay.textContent = 'Failed to load model.';
          console.error(err);
        }
      );

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
